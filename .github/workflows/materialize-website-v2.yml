# Final exact-fragment materialization pass — exact transfer hash verified.
name: materialize-website-v2

on:
  pull_request:
    branches: [main]
    paths:
      - ".website-v2-bundle/**"
      - ".github/workflows/materialize-website-v2.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: website/international-standard-redesign-v2
          fetch-depth: 1
          show-progress: false
      - name: Reconstruct and verify exact website V2 bundle
        shell: bash
        run: |
          set -u
          : > /tmp/website-v2-integrity.txt
          invalid=0
          for part in .website-v2-bundle/part*.b64; do
            if base64 --decode "${part}" > /dev/null 2>&1; then
              echo "valid_base64 ${part}" >> /tmp/website-v2-integrity.txt
            else
              echo "INVALID_BASE64 ${part}" >> /tmp/website-v2-integrity.txt
              invalid=1
            fi
            sha256sum "${part}" >> /tmp/website-v2-integrity.txt
          done
          set +e
          cat .website-v2-bundle/part*.b64 | base64 --decode > /tmp/aduc-website-v2-text.tar.gz
          decode_rc=$?
          set -e
          actual_size="$(wc -c < /tmp/aduc-website-v2-text.tar.gz | tr -d ' ')"
          actual_sha="$(sha256sum /tmp/aduc-website-v2-text.tar.gz | awk '{print $1}')"
          {
            echo "decode_rc=${decode_rc}"
            echo "actual_size=${actual_size}"
            echo "actual_sha256=${actual_sha}"
            echo "expected_size=64290"
            echo "expected_sha256=736f5c0f4f3294bc41319adbbce5fc242059505b8e85d90d863dee6bf73675e3"
          } >> /tmp/website-v2-integrity.txt
          cat /tmp/website-v2-integrity.txt
          if [ "${invalid}" != "0" ] || [ "${decode_rc}" != "0" ] || [ "${actual_size}" != "64290" ] || [ "${actual_sha}" != "736f5c0f4f3294bc41319adbbce5fc242059505b8e85d90d863dee6bf73675e3" ]; then
            cp /tmp/website-v2-integrity.txt .website-v2-integrity.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .website-v2-integrity.txt
            git commit -m "CI: record website V2 bundle integrity mismatch"
            git push origin HEAD:website/international-standard-redesign-v2
            exit 1
          fi
          tar -xzf /tmp/aduc-website-v2-text.tar.gz
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify generated pages are reproducible
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import subprocess

          generated = [
              "website/index.html",
              "website/why-aduc.html",
              "website/core.html",
              "website/validate.html",
              "website/compare.html",
              "website/trust.html",
              "website/evidence.html",
              "website/roadmap.html",
              "website/docs.html",
              "website/architecture.html",
              "website/example.html",
              "website/specification.html",
              "website/404.html",
              "website/robots.txt",
              "website/sitemap.xml",
          ]
          before = {path: Path(path).read_bytes() for path in generated}
          subprocess.run(["python", "website/build_site.py"], check=True)
          after = {path: Path(path).read_bytes() for path in generated}
          changed = [path for path in generated if before[path] != after[path]]
          if changed:
              raise SystemExit("Generator output differs from reviewed bundle: " + ", ".join(changed))
          PY
      - name: Run website and repository validation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m py_compile website/build_site.py tools/validate_website.py tests/website/test_public_site_alignment.py
          node --check website/assets/app.js
          python -m unittest discover -s tests/website -p "test_*.py"
          python tools/validate_website.py
          python -m unittest discover -s tests/roadmap -p "test_*.py"
          python tools/validate_contracts.py
          python tools/aduc_core.py validate examples/core/complete-model.example.json
          python tools/aduc_core.py compare examples/core/complete-model.example.json examples/core/complete-model.example.json
          python -m unittest discover -s tests -p "test_*.py"
      - name: Commit verified website V2 and remove transfer files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website tests/website/test_public_site_alignment.py tools/validate_website.py
          git rm -r .website-v2-bundle
          git rm -f .website-v2-integrity.txt || true
          git rm .github/workflows/materialize-website-v2.yml
          git commit -m "Website V2: rebuild international reference experience"
          git push origin HEAD:website/international-standard-redesign-v2
