name: materialize-core-formatter

on:
  pull_request:
    branches: [main]
    paths:
      - ".formatter-bundle/**"
      - ".github/workflows/materialize-core-formatter.yml"

permissions:
  contents: write

concurrency:
  group: materialize-core-formatter-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: core/deterministic-complete-contract-formatter
          fetch-depth: 0
          show-progress: false

      - name: Reconstruct and verify formatter bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .formatter-bundle/part*.b64 | base64 --decode > /tmp/aduc-formatter-v1.tar.gz
          actual_size="$(wc -c < /tmp/aduc-formatter-v1.tar.gz | tr -d ' ')"
          actual_sha="$(sha256sum /tmp/aduc-formatter-v1.tar.gz | awk '{print $1}')"
          echo "actual_size=${actual_size}"
          echo "actual_sha256=${actual_sha}"
          test "${actual_size}" = "11438"
          test "${actual_sha}" = "56390a2a6d74f772dcb14e09d4f289f0dc1bbc81ae2928876aa5c6efd13ad3f9"
          python - <<'PY'
          import tarfile
          from pathlib import PurePosixPath

          archive = "/tmp/aduc-formatter-v1.tar.gz"
          allowed = {
              ".github/workflows/validate.yml",
              "docs/decisions/ADR-0018-deterministic-complete-contract-formatting.md",
              "docs/errors/CORE_FORMATTER_ERROR_CATALOGUE_0_1.md",
              "examples/core/formatting/cases.json",
              "examples/core/formatting/rejected-duplicate-key.json",
              "examples/core/formatting/review-required-unordered.formatted.json",
              "examples/core/formatting/review-required-unordered.json",
              "examples/core/formatting/valid-unordered.formatted.json",
              "examples/core/formatting/valid-unordered.json",
              "spec/ADUC_CORE_FORMATTING_0_1.md",
              "tests/core_formatter/test_aduc_core_formatter.py",
              "tools/aduc_core_format.py",
          }
          with tarfile.open(archive, "r:gz") as handle:
              members = handle.getmembers()
              names = {member.name for member in members if member.isfile()}
              if names != allowed:
                  raise SystemExit(f"Unexpected formatter bundle paths: {sorted(names ^ allowed)}")
              for member in members:
                  path = PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"Unsafe formatter bundle member: {member.name}")
                  if not member.isfile() and not member.isdir():
                      raise SystemExit(f"Unsupported formatter bundle member: {member.name}")
          PY
          tar -xzf /tmp/aduc-formatter-v1.tar.gz

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Check formatter syntax
        run: python -m py_compile tools/aduc_core_format.py tests/core_formatter/test_aduc_core_formatter.py

      - name: Run formatter tests
        run: python -m unittest discover -s tests/core_formatter -p "test_*.py"

      - name: Validate contracts and Core engine
        run: |
          python tools/validate_contracts.py
          python tools/aduc_core_validate.py examples/core/complete-model.example.json
          python tools/aduc_core.py validate examples/core/complete-model.example.json
          python tools/aduc_core.py compare examples/core/complete-model.example.json examples/core/complete-model.example.json

      - name: Run all official focused suites
        run: |
          for suite in validator comparator jsonld conformance epistemic source_binding units time identity provenance uncertainty relations policy core_model core_schema core_validator core_comparator roadmap website; do
            python -m unittest discover -s "tests/${suite}" -p "test_*.py"
          done
          python tools/validate_website.py

      - name: Exercise formatter CLI twice
        shell: bash
        run: |
          set -euo pipefail
          first_rc=0
          python tools/aduc_core_format.py examples/core/complete-model.example.json --output /tmp/aduc-formatted-1.json --report-format json > /tmp/aduc-format-report-1.json || first_rc=$?
          test "${first_rc}" = "0" -o "${first_rc}" = "2"
          second_rc=0
          python tools/aduc_core_format.py /tmp/aduc-formatted-1.json --output /tmp/aduc-formatted-2.json --report-format json > /tmp/aduc-format-report-2.json || second_rc=$?
          test "${second_rc}" = "${first_rc}"
          cmp /tmp/aduc-formatted-1.json /tmp/aduc-formatted-2.json
          python tools/aduc_core.py validate /tmp/aduc-formatted-2.json
          python tools/aduc_core.py compare examples/core/complete-model.example.json /tmp/aduc-formatted-2.json

      - name: Commit verified formatter implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/decisions/ADR-0018-deterministic-complete-contract-formatting.md \
            docs/errors/CORE_FORMATTER_ERROR_CATALOGUE_0_1.md \
            examples/core/formatting \
            spec/ADUC_CORE_FORMATTING_0_1.md \
            tests/core_formatter \
            tools/aduc_core_format.py
          git commit -m "Core: add deterministic complete-contract formatter"
          git push origin HEAD:core/deterministic-complete-contract-formatter
