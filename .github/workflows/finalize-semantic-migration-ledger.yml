name: finalize-semantic-migration-ledger

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/finalize-semantic-migration-ledger.yml"

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: core/semantic-profile-migration-v3
      - name: Append verified milestone evidence
        shell: bash
        run: |
          set -euo pipefail
          marker='| 2026-07-14 | #55 / #59 | Implement deterministic semantic-profile migration |'
          if ! grep -Fq "$marker" docs/roadmap/EXECUTION_LEDGER.md; then
            cat >> docs/roadmap/EXECUTION_LEDGER.md <<'EOF'
          | 2026-07-14 | #55 / #59 | Implement deterministic semantic-profile migration | ADR-0017; explicit migration-manifest schema; inferred, unverified-canonical and contested end-to-end fixtures; 19 focused migration tests; 188 total repository tests; contract and website validators; every generated contract revalidated through `tools/aduc_core.py validate` | Standalone semantic profiles can be migrated locally into complete ten-block Core contracts without inferring missing bindings, authority, identity or policy facts; review-required and contested states remain explicit | Prepare the gated deterministic complete-Core contract-formatting milestone |
          EOF
          fi
      - name: Commit ledger and remove finalizer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmap/EXECUTION_LEDGER.md
          git rm .github/workflows/finalize-semantic-migration-ledger.yml
          git commit -m "Docs: record semantic-profile migration evidence"
          git push origin HEAD:core/semantic-profile-migration-v3
