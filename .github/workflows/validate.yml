name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - run: python tools/validate_contracts.py
      - run: python -m unittest discover -s tests/validator -p "test_*.py"
      - run: python -m unittest discover -s tests/comparator -p "test_*.py"
      - run: python -m unittest discover -s tests/jsonld -p "test_*.py"
      - name: Run conformance tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests/conformance -p "test_*.py" > conformance-test.log 2>&1
          status=$?
          cat conformance-test.log
          printf '%s\n' "$status" > conformance-test.status
          exit "$status"
      - name: Upload conformance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-diagnostics
          path: |
            conformance-test.log
            conformance-test.status
      - name: Validate website
        if: always()
        run: python tools/validate_website.py
