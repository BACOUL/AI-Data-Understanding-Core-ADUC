name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - run: python tools/validate_contracts.py
      - run: python -m unittest discover -s tests/validator -p "test_*.py"
      - run: python -m unittest discover -s tests/comparator -p "test_*.py"
      - run: python -m unittest discover -s tests/jsonld -p "test_*.py"
      - run: python -m unittest discover -s tests/conformance -p "test_*.py"
      - run: python -m unittest discover -s tests/epistemic -p "test_*.py"
      - run: python -m unittest discover -s tests/source_binding -p "test_*.py"
      - run: python -m unittest discover -s tests/units -p "test_*.py"
      - run: python -m unittest discover -s tests/time -p "test_*.py"
      - run: python -m unittest discover -s tests/identity -p "test_*.py"
      - run: python -m unittest discover -s tests/provenance -p "test_*.py"
      - run: python -m unittest discover -s tests/uncertainty -p "test_*.py"
      - run: python -m unittest discover -s tests/relations -p "test_*.py"
      - run: python -m unittest discover -s tests/policy -p "test_*.py"
      - run: python -m unittest discover -s tests/core_model -p "test_*.py"
      - run: python -m unittest discover -s tests/core_schema -p "test_*.py"
      - run: python -m unittest discover -s tests/core_validator -p "test_*.py"
      - run: python -m unittest discover -s tests/core_comparator -p "test_*.py"
      - run: python -m unittest discover -s tests/core_formatter -p "test_*.py"
      - run: python tools/aduc_core_validate.py examples/core/complete-model.example.json
      - run: python tools/aduc_core.py validate examples/core/complete-model.example.json
      - run: python tools/aduc_core.py compare examples/core/complete-model.example.json examples/core/complete-model.example.json
      - run: python -m unittest discover -s tests/roadmap -p "test_*.py"
      - run: python -m unittest discover -s tests/website -p "test_*.py"
      - run: python tools/validate_website.py

  finalize_formatter_docs:
    if: github.event_name == 'pull_request' && github.head_ref == 'core/deterministic-complete-contract-formatter'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: core/deterministic-complete-contract-formatter
          fetch-depth: 0
      - name: Apply formatter milestone documentation once
        shell: bash
        run: |
          set -euo pipefail
          if grep -q "provider-neutral full-Core conformance runner" docs/roadmap/NEXT_ACTION.md; then
            echo "Formatter milestone documentation is already synchronized."
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/finalize-formatter-docs.yml').read_text(encoding='utf-8')
          body = source.split("python - <<'PY'\n", 1)[1].split("\n          PY\n", 1)[0]
          body = "\n".join(line[10:] if line.startswith("          ") else line for line in body.splitlines()) + "\n"
          Path('/tmp/finalize_formatter_docs.py').write_text(body, encoding='utf-8')
          PY
          python /tmp/finalize_formatter_docs.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md docs/roadmap
          git commit -m "Roadmap: close formatter milestone and authorize conformance runner"
          git push origin HEAD:core/deterministic-complete-contract-formatter
