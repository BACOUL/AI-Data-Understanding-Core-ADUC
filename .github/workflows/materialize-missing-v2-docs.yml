name: materialize-missing-v2-docs

on:
  pull_request:
    branches: [main]
    paths:
      - ".docs-repair/**"
      - ".github/workflows/materialize-missing-v2-docs.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/restore-unified-core-engine
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct exact archive
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          source = Path('.docs-repair/part03a.b64').read_text(encoding='ascii')
          assert len(source) == 910
          assert sha256(source.encode('ascii')).hexdigest() == 'e9255dd2639dda790d34d114f962bc8454cba83c09eb18939800364de8444f15'
          assert source[497] == 't'
          corrected = source[:497] + 'k' + source[498:]
          assert sha256(corrected.encode('ascii')).hexdigest() == 'b32ab3b272a0cdf7f4732b6905018b6bc2024d0dd8d9f829da8bb6323aa1e5ce'
          Path('/tmp/part03a.corrected.b64').write_text(corrected, encoding='ascii')
          PY
          cat \
            .docs-repair/part00.b64 \
            .docs-repair/part01.b64 \
            .docs-repair/part02.b64 \
            /tmp/part03a.corrected.b64 \
            .docs-repair/part03b.b64 \
            | base64 --decode > /tmp/aduc-v2-missing-docs.tar.gz
          test "$(wc -c < /tmp/aduc-v2-missing-docs.tar.gz | tr -d ' ')" = "17113"
          test "$(sha256sum /tmp/aduc-v2-missing-docs.tar.gz | awk '{print $1}')" = "d1a1d3b45bd7703923e053711bb1563ecc9d0d8109f41af23807a9802531eb2c"
      - name: Extract and verify exact omitted v2 files
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/aduc-v2-missing-docs.tar.gz
          test "$(wc -c < README.md | tr -d ' ')" = "13892"
          test "$(sha256sum README.md | awk '{print $1}')" = "26e88e1ca5e9f2bc1fcc11d30a67a35f21415b480d77989e87bb9e013814fbd6"
          test "$(wc -c < schema/README.md | tr -d ' ')" = "3248"
          test "$(sha256sum schema/README.md | awk '{print $1}')" = "f8205d31474feb901163198e6db037f49cfcff711fb23e918b35f3cbb896aba7"
          test "$(wc -c < spec/ADUC_CORE_SPEC_0_1.md | tr -d ' ')" = "13986"
          test "$(sha256sum spec/ADUC_CORE_SPEC_0_1.md | awk '{print $1}')" = "81619957cb9d8cb6fc159add36c9a5c36fbd1ae1d98b6ea9af8958c44cb36f6c"
          test "$(wc -c < website/docs.html | tr -d ' ')" = "12630"
          test "$(sha256sum website/docs.html | awk '{print $1}')" = "d4ff5663960e8a2e2a7d4647c220411fb4ce13c76392cefeead4af77334e0d47"
          test "$(wc -c < website/roadmap.html | tr -d ' ')" = "9005"
          test "$(sha256sum website/roadmap.html | awk '{print $1}')" = "a202e8d2d11e05cd3ea8dff96539f0c105443f4a532e5dbb2f9f6f68d2fed958"
          test "$(wc -c < website/specification.html | tr -d ' ')" = "12165"
          test "$(sha256sum website/specification.html | awk '{print $1}')" = "4776734eb6d7a90bc81c82aac73c57736a0f60569d441c6ae0a1462d0d7ac607"
      - name: Validate roadmap and website
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m unittest discover -s tests/roadmap -p "test_*.py"
          python -m unittest discover -s tests/website -p "test_*.py"
          python tools/validate_website.py
      - name: Commit exact files and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md schema/README.md spec/ADUC_CORE_SPEC_0_1.md website/docs.html website/roadmap.html website/specification.html
          git rm -r .docs-repair
          git rm .github/workflows/materialize-missing-v2-docs.yml
          git commit -m "Repair: restore omitted audited v2 documentation"
          git push origin HEAD:repair/restore-unified-core-engine
