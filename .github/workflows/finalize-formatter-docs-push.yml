name: finalize-formatter-docs-push

on:
  push:
    branches:
      - core/deterministic-complete-contract-formatter

permissions:
  contents: write

concurrency:
  group: finalize-formatter-docs-push
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: core/deterministic-complete-contract-formatter
          fetch-depth: 0
      - name: Extract and execute reviewed documentation patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/finalize-formatter-docs.yml').read_text(encoding='utf-8')
          body = source.split("python - <<'PY'\n", 1)[1].split("\n          PY\n", 1)[0]
          body = "\n".join(line[10:] if line.startswith("          ") else line for line in body.splitlines()) + "\n"
          Path('/tmp/finalize_formatter_docs.py').write_text(body, encoding='utf-8')
          PY
          python /tmp/finalize_formatter_docs.py
      - name: Validate synchronized documentation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m unittest discover -s tests/core_formatter -p "test_*.py"
          python -m unittest discover -s tests/roadmap -p "test_*.py"
          python -m unittest discover -s tests/website -p "test_*.py"
          python tools/validate_website.py
          formatter_rc=0
          python tools/aduc_core_format.py examples/core/complete-model.example.json --output /tmp/aduc-finalized.json --report-format json >/tmp/aduc-format-report.json || formatter_rc=$?
          test "${formatter_rc}" = "0" -o "${formatter_rc}" = "2"
          python tools/aduc_core.py validate /tmp/aduc-finalized.json
      - name: Commit synchronized milestone documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md docs/roadmap
          git commit -m "Roadmap: close formatter milestone and authorize conformance runner"
          git push origin HEAD:core/deterministic-complete-contract-formatter
