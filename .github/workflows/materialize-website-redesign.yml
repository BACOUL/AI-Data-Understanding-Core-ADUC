name: materialize-website-redesign

on:
  pull_request:
    branches: [main]
    paths:
      - ".website-redesign/**"
      - ".github/workflows/materialize-website-redesign.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: website/align-with-complete-aduc-core
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct and inspect redesign bundle
        id: reconstruct
        continue-on-error: true
        shell: bash
        run: |
          set -u
          merge_base="$(git merge-base HEAD origin/main)"
          cat .website-redesign/part*.b64 > /tmp/aduc-website-redesign.b64
          cat .website-redesign/remaining*.hex | xxd -r -p >> /tmp/aduc-website-redesign.b64
          base64 --decode /tmp/aduc-website-redesign.b64 > /tmp/aduc-website-redesign.tar.gz
          {
            echo "merge_base=${merge_base}"
            echo "base64_bytes=$(wc -c < /tmp/aduc-website-redesign.b64 | tr -d ' ')"
            echo "archive_bytes=$(wc -c < /tmp/aduc-website-redesign.tar.gz | tr -d ' ')"
            echo "archive_sha256=$(sha256sum /tmp/aduc-website-redesign.tar.gz | awk '{print $1}')"
            wc -c .website-redesign/part*.b64 .website-redesign/remaining*.hex
            sha256sum .website-redesign/part*.b64 .website-redesign/remaining*.hex
          } > /tmp/website-redesign-integrity.txt
          test "${merge_base}" = "3131ab30987f1f67579cc6db0d6d0f92c49b826f"
          test "$(wc -c < /tmp/aduc-website-redesign.tar.gz | tr -d ' ')" = "55083"
          test "$(sha256sum /tmp/aduc-website-redesign.tar.gz | awk '{print $1}')" = "c3d035bc1144f1360822bac32a77d86360f9cb01d17754ff8b24d168d0f4699d"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: website-redesign-integrity
          path: /tmp/website-redesign-integrity.txt
      - name: Reject integrity mismatch
        if: steps.reconstruct.outcome != 'success'
        run: exit 1
      - name: Extract and verify project files
        shell: bash
        run: |
          set -euo pipefail
          mkdir /tmp/aduc-redesign
          tar -xzf /tmp/aduc-website-redesign.tar.gz -C /tmp/aduc-redesign
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          source_root = Path('/tmp/aduc-redesign')
          repository_root = Path('.')
          manifest = json.loads((source_root / 'WEBSITE_REDESIGN_MANIFEST.json').read_text(encoding='utf-8'))
          assert manifest['baseCommit'] == '3131ab30987f1f67579cc6db0d6d0f92c49b826f'
          allowed_roots = ('website/', 'tests/website/', 'tools/validate_website.py', 'README.md', 'CHANGELOG.md', 'docs/roadmap/PROJECT_STATUS.md', 'docs/roadmap/NEXT_ACTION.md', 'tests/roadmap/test_adoption_value_plan.py')
          for item in manifest['files']:
              path = item['path']
              assert any(path == root or path.startswith(root) for root in allowed_roots), path
              source = source_root / path
              data = source.read_bytes()
              assert len(data) == item['size'], path
              assert hashlib.sha256(data).hexdigest() == item['sha256'], path
              target = repository_root / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(data)

          next_action = repository_root / 'docs/roadmap/NEXT_ACTION.md'
          text = next_action.read_text(encoding='utf-8')
          old = 'Define and implement the deterministic complete-contract formatter for validated ADUC Core contracts.'
          new = 'Define and implement the deterministic complete-contract formatter for complete ADUC Core contracts.'
          assert old in text
          next_action.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git add website
          python website/build_site.py
          git diff --exit-code -- website
          git reset
      - name: Validate complete repository with diagnostics
        shell: bash
        run: |
          set +e
          : > /tmp/validation-status.txt
          failed=0

          run_check() {
            name="$1"
            shift
            "$@" > "/tmp/${name}.log" 2>&1
            rc=$?
            echo "${name}=${rc}" >> /tmp/validation-status.txt
            if [ "$rc" -ne 0 ]; then failed=1; fi
          }

          run_check install python -m pip install --disable-pip-version-check -q -r requirements-dev.txt
          run_check contracts python tools/validate_contracts.py
          run_check test-validator python -m unittest discover -s tests/validator -p "test_*.py"
          run_check test-comparator python -m unittest discover -s tests/comparator -p "test_*.py"
          run_check test-jsonld python -m unittest discover -s tests/jsonld -p "test_*.py"
          run_check test-conformance python -m unittest discover -s tests/conformance -p "test_*.py"
          run_check test-epistemic python -m unittest discover -s tests/epistemic -p "test_*.py"
          run_check test-source-binding python -m unittest discover -s tests/source_binding -p "test_*.py"
          run_check test-units python -m unittest discover -s tests/units -p "test_*.py"
          run_check test-time python -m unittest discover -s tests/time -p "test_*.py"
          run_check test-identity python -m unittest discover -s tests/identity -p "test_*.py"
          run_check test-provenance python -m unittest discover -s tests/provenance -p "test_*.py"
          run_check test-uncertainty python -m unittest discover -s tests/uncertainty -p "test_*.py"
          run_check test-relations python -m unittest discover -s tests/relations -p "test_*.py"
          run_check test-policy python -m unittest discover -s tests/policy -p "test_*.py"
          run_check test-core-model python -m unittest discover -s tests/core_model -p "test_*.py"
          run_check test-core-schema python -m unittest discover -s tests/core_schema -p "test_*.py"
          run_check test-core-validator python -m unittest discover -s tests/core_validator -p "test_*.py"
          run_check test-core-comparator python -m unittest discover -s tests/core_comparator -p "test_*.py"
          run_check test-core-migration python -m unittest discover -s tests/core_migration -p "test_*.py"
          run_check test-roadmap python -m unittest discover -s tests/roadmap -p "test_*.py"
          run_check test-website python -m unittest discover -s tests/website -p "test_*.py"
          run_check schema python tools/aduc_core_validate.py examples/core/complete-model.example.json
          run_check core-validate python tools/aduc_core.py validate examples/core/complete-model.example.json
          run_check core-compare python tools/aduc_core.py compare examples/core/complete-model.example.json examples/core/complete-model.example.json
          run_check website-validator python tools/validate_website.py
          set -e

          if [ "$failed" -ne 0 ]; then
            {
              cat /tmp/validation-status.txt
              for file in /tmp/contracts.log /tmp/test-*.log /tmp/schema.log /tmp/core-*.log /tmp/website-validator.log; do
                echo
                echo "===== ${file} ====="
                tail -n 120 "$file"
              done
            } > .website-redesign/validation-diagnostic.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .website-redesign/validation-diagnostic.txt
            git commit -m "CI: record website redesign validation failure"
            git push origin HEAD:website/align-with-complete-aduc-core
            exit 1
          fi
      - name: Commit verified redesign and remove transfer files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md docs/roadmap/PROJECT_STATUS.md docs/roadmap/NEXT_ACTION.md tests/roadmap/test_adoption_value_plan.py tests/website/test_public_site_alignment.py tools/validate_website.py website
          git rm -r .website-redesign
          git rm .github/workflows/materialize-website-redesign.yml
          git commit -m "Website: align public site with complete ADUC Core"
          git push origin HEAD:website/align-with-complete-aduc-core
