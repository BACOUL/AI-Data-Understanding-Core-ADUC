name: materialize-website-redesign

on:
  pull_request:
    branches: [main]
    paths:
      - ".website-redesign/**"
      - ".github/workflows/materialize-website-redesign.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: website/align-with-complete-aduc-core
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct and verify redesign bundle
        shell: bash
        run: |
          set -euo pipefail
          test "$(git merge-base HEAD origin/main)" = "3131ab30987f1f67579cc6db0d6d0f92c49b826f"
          cat .website-redesign/part*.b64 > /tmp/aduc-website-redesign.b64
          cat .website-redesign/remaining*.hex | xxd -r -p >> /tmp/aduc-website-redesign.b64
          base64 --decode /tmp/aduc-website-redesign.b64 > /tmp/aduc-website-redesign.tar.gz
          test "$(wc -c < /tmp/aduc-website-redesign.tar.gz | tr -d ' ')" = "55083"
          test "$(sha256sum /tmp/aduc-website-redesign.tar.gz | awk '{print $1}')" = "c3d035bc1144f1360822bac32a77d86360f9cb01d17754ff8b24d168d0f4699d"
          mkdir /tmp/aduc-redesign
          tar -xzf /tmp/aduc-website-redesign.tar.gz -C /tmp/aduc-redesign
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import json

          source_root = Path('/tmp/aduc-redesign')
          repository_root = Path('.')
          manifest = json.loads((source_root / 'WEBSITE_REDESIGN_MANIFEST.json').read_text(encoding='utf-8'))
          assert manifest['baseCommit'] == '3131ab30987f1f67579cc6db0d6d0f92c49b826f'
          allowed_roots = ('website/', 'tests/website/', 'tools/validate_website.py', 'README.md', 'CHANGELOG.md', 'docs/roadmap/PROJECT_STATUS.md', 'docs/roadmap/NEXT_ACTION.md', 'tests/roadmap/test_adoption_value_plan.py')
          for item in manifest['files']:
              path = item['path']
              assert any(path == root or path.startswith(root) for root in allowed_roots), path
              source = source_root / path
              data = source.read_bytes()
              assert len(data) == item['size'], path
              assert hashlib.sha256(data).hexdigest() == item['sha256'], path
              target = repository_root / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(data)
          PY
          git add website
          python website/build_site.py
          git diff --exit-code -- website
          git reset
      - name: Validate complete repository
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python tools/validate_contracts.py
          python -m unittest discover -s tests -p "test_*.py"
          python tools/aduc_core_validate.py examples/core/complete-model.example.json
          python tools/aduc_core.py validate examples/core/complete-model.example.json
          python tools/aduc_core.py compare examples/core/complete-model.example.json examples/core/complete-model.example.json
          python tools/validate_website.py
      - name: Commit verified redesign and remove transfer files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md docs/roadmap/PROJECT_STATUS.md docs/roadmap/NEXT_ACTION.md tests/roadmap/test_adoption_value_plan.py tests/website/test_public_site_alignment.py tools/validate_website.py website
          git rm -r .website-redesign
          git rm .github/workflows/materialize-website-redesign.yml
          git commit -m "Website: align public site with complete ADUC Core"
          git push origin HEAD:website/align-with-complete-aduc-core
