name: finalize-formatter-docs

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/finalize-formatter-docs.yml"

permissions:
  contents: write

concurrency:
  group: finalize-formatter-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: core/deterministic-complete-contract-formatter
          fetch-depth: 0
      - name: Synchronize formatter milestone documentation
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:100]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "README.md",
              "- deterministic migration from the standalone semantic-mapping profile into complete ADUC Core contracts.\n\nSingle active technical task:\n\n- deterministic formatting of complete validated Core contracts without inference or silent repair.",
              "- deterministic migration from the standalone semantic-mapping profile into complete ADUC Core contracts;\n- deterministic formatting of complete validated Core contracts with exact-decimal preservation, stable reports and byte idempotence.\n\nSingle active technical task:\n\n- provider-neutral full-Core conformance runner for validators, comparators and formatters.",
          )
          replace(
              "README.md",
              "- JSON/CSV compiler;\n- graphical review interface;",
              "- provider-neutral full-Core conformance runner;\n- TypeScript and Python SDKs;\n- JSON/CSV compiler;\n- graphical review interface;",
          )
          replace(
              "README.md",
              "Unsafe inputs with duplicate identifiers, unresolved references, ownership violations, resource-binding errors, namespace conflicts or unsupported required extensions are not indexed as trustworthy comparable contracts.\n\n## Run Checks",
              "Unsafe inputs with duplicate identifiers, unresolved references, ownership violations, resource-binding errors, namespace conflicts or unsupported required extensions are not indexed as trustworthy comparable contracts.\n\n## Format A Complete Core Contract\n\n```bash\npython tools/aduc_core_format.py examples/core/complete-model.example.json --output complete-model.formatted.json\npython tools/aduc_core_format.py examples/core/complete-model.example.json --output complete-model.formatted.json --report-format json\n```\n\nThe formatter validates before and after serialization, preserves exact decimal values and every array order, rejects duplicate JSON members, writes atomically and produces identical bytes when run repeatedly. Exit code `2` means the valid contract still requires human review; formatting never removes that state.\n\n## Run Checks",
          )
          replace(
              "README.md",
              "python -m unittest discover -s tests/core_comparator -p \"test_*.py\"\npython tools/aduc_core_validate.py examples/core/complete-model.example.json",
              "python -m unittest discover -s tests/core_comparator -p \"test_*.py\"\npython -m unittest discover -s tests/core_formatter -p \"test_*.py\"\npython tools/aduc_core_validate.py examples/core/complete-model.example.json",
          )

          replace(
              "CHANGELOG.md",
              "- Unified full-Core validator and deterministic comparator with stable JSON/text reports.",
              "- Unified full-Core validator and deterministic comparator with stable JSON/text reports.\n- ADR-0018 deterministic complete-contract formatter with strict JSON parsing, exact-decimal preservation, frozen Core ordering, unchanged array order, atomic output, stable reports and byte idempotence.",
          )
          replace(
              "CHANGELOG.md",
              "- ADR-0017 - deterministic semantic-profile migration: explicit manifest, conservative mappings, stable reports, complete Core revalidation and 19 focused tests.",
              "- ADR-0018 - deterministic complete-contract formatting: valid, review-required and rejected fixtures; exact-decimal and Unicode preservation; duplicate-key, path-collision and overwrite-race regressions; 13 focused tests.\n- ADR-0017 - deterministic semantic-profile migration: explicit manifest, conservative mappings, stable reports, complete Core revalidation and 19 focused tests.",
          )
          replace(
              "CHANGELOG.md",
              "- README, roadmap and public website now reflect the full-Core program, the implemented unified validator/comparator and semantic-profile migration, plus the active deterministic formatter task rather than a narrow mapping-only package or outdated validator/comparator roadmap.",
              "- README and roadmap now reflect the implemented validator, comparator, migration and deterministic formatter, with the provider-neutral conformance runner as the single next engine task. Website redesign remains isolated in PR #63.",
          )
          replace(
              "CHANGELOG.md",
              "- Deterministic complete-contract formatter.\n- JSON/CSV compiler and review UI.",
              "- Provider-neutral full-Core conformance runner.\n- TypeScript and Python SDKs.\n- JSON/CSV compiler and review UI.",
          )

          replace(
              "docs/roadmap/PROJECT_STATUS.md",
              "- Overall status: nine domain profiles, the normative Core object model, the official modular Draft 2020-12 schema family and the unified full-Core validator/comparator are implemented and reference-tested; the deterministic semantic-profile migration is implemented and reference-tested; the public website now presents that state directly; deterministic complete-contract formatting is the single next task",
              "- Overall status: nine domain profiles, the normative Core object model, the official modular Draft 2020-12 schema family, the unified full-Core validator/comparator, deterministic semantic-profile migration and deterministic complete-contract formatter are implemented and reference-tested; the provider-neutral full-Core conformance runner is the single next engine task",
          )
          replace(
              "docs/roadmap/PROJECT_STATUS.md",
              "- ADR-0017 deterministic semantic-profile migration into complete Core contracts.",
              "- ADR-0017 deterministic semantic-profile migration into complete Core contracts;\n- ADR-0018 deterministic complete-contract formatting with exact-decimal and array-order preservation.",
          )
          replace(
              "docs/roadmap/PROJECT_STATUS.md",
              "| Deterministic semantic-profile migration | explicit migration manifest, conservative status mapping, complete Core revalidation, three frozen end-to-end scenarios and 19 focused tests |",
              "| Deterministic semantic-profile migration | explicit migration manifest, conservative status mapping, complete Core revalidation, three frozen end-to-end scenarios and 19 focused tests |\n| Deterministic complete-contract formatter | strict UTF-8 JSON parser, duplicate-key rejection, exact-decimal preservation, frozen Core ordering, unchanged arrays, atomic writes, stable reports, frozen fixtures and 13 focused tests |",
          )
          replace(
              "docs/roadmap/PROJECT_STATUS.md",
              "| Deterministic complete-contract formatter | Next action |",
              "| Deterministic complete-contract formatter | Complete |\n| Provider-neutral full-Core conformance runner | Next action |",
          )
          replace(
              "docs/roadmap/PROJECT_STATUS.md",
              "- deterministic formatting for complete validated Core contracts is not yet implemented;\n- no qualifying value benchmark or external multi-model runs exist;",
              "- a provider-neutral full-Core conformance runner is not yet implemented;\n- public TypeScript/Python SDKs and package-release controls are not yet implemented;\n- no qualifying value benchmark or external multi-model runs exist;",
          )
          replace(
              "docs/roadmap/PROJECT_STATUS.md",
              "Define and implement deterministic formatting for complete validated Core contracts without inference, repair or semantic change. The JSON/CSV compiler remains blocked until the adoption and review-tax gates are ready to run.",
              "Define and implement the provider-neutral full-Core conformance runner for validator, comparator and formatter implementations. The runner must produce reproducible implementation reports without treating the reference engine as the specification. The JSON/CSV compiler remains blocked until the adoption and review-tax gates are ready to run.",
          )

          replace("docs/roadmap/MASTER_PLAN.md", "- Date: 2026-07-14", "- Date: 2026-07-15")
          replace(
              "docs/roadmap/MASTER_PLAN.md",
              "- unified full-Core validator and deterministic comparator;\n- governance, CI, execution ledger, English website, GitHub Pages and Vercel deployment.",
              "- unified full-Core validator and deterministic comparator;\n- deterministic semantic-profile migration into complete Core contracts;\n- deterministic complete-contract formatter;\n- governance, CI, execution ledger, English website, GitHub Pages and Vercel deployment.",
          )
          replace(
              "docs/roadmap/MASTER_PLAN.md",
              "- [ ] migration fixtures from the current mapping profile.",
              "- [x] migration fixtures from the standalone semantic-mapping profile.",
          )
          replace(
              "docs/roadmap/MASTER_PLAN.md",
              "- [ ] contract formatter;\n- [x] unified comparator across concepts, units, time, identity, provenance, uncertainty, relations and policy;\n- [ ] TypeScript SDK;\n- [ ] Python SDK;\n- [ ] conformance runner;",
              "- [x] contract formatter;\n- [x] unified comparator across concepts, units, time, identity, provenance, uncertainty, relations and policy;\n- [ ] conformance runner;\n- [ ] TypeScript SDK;\n- [ ] Python SDK;",
          )
          replace(
              "docs/roadmap/MASTER_PLAN.md",
              "The only active technical task remains the deterministic migration path from the standalone semantic-mapping profile into complete Core contracts, as defined in `docs/roadmap/NEXT_ACTION.md`.\n\nThis Master Plan expansion does not authorize the compiler, review UI, SaaS, MCP adapter, extensions, anticipation engine or external multi-model proof ahead of their gates.",
              "The only active technical task is the provider-neutral full-Core conformance runner for validator, comparator and formatter implementations, as defined in `docs/roadmap/NEXT_ACTION.md`.\n\nThe conformance runner must not be presented as independent proof merely because it passes the reference implementation. This Master Plan does not authorize the compiler, review UI, SaaS, MCP adapter, extensions, anticipation engine or external multi-model proof ahead of their gates.",
          )

          replace(
              "docs/roadmap/CROSS_CUTTING_COVERAGE_MATRIX.md",
              "## Current priority\n\nThe matrix does not change the active technical task. The current task remains migration from the standalone semantic-mapping profile into complete Core contracts.",
              "## Current priority\n\nThe ADR-0018 formatter assessment is recorded in `docs/roadmap/reviews/ADR-0018_CROSS_CUTTING_REVIEW.md`.\n\nThe matrix does not change the active technical task. The current task is the provider-neutral full-Core conformance runner for validators, comparators and formatters.",
          )

          Path("docs/roadmap/NEXT_ACTION.md").write_text("""# Next Action

## Single active task

Define and implement the provider-neutral full-Core conformance runner.

## Objective

Provide a deterministic local runner that executes frozen ADUC conformance cases against validator, comparator and formatter implementations and produces a stable implementation report.

The runner must test declared behavior without treating the Python reference engine as the specification or presenting a self-test as independent interoperability proof.

## Completed dependencies

- ADR-0014 normative Core object model and module boundaries;
- ADR-0015 official modular Core JSON Schema family;
- ADR-0016 unified Core validation and comparison;
- ADR-0017 deterministic semantic-profile migration;
- ADR-0018 deterministic complete-contract formatting;
- stable validator, comparator, migration and formatter reports.

## Required work

1. define versioned conformance classes for contracts, validators, comparators and formatters;
2. create a frozen machine-readable test manifest with required, optional and unsupported capabilities;
3. provide a local runner and an explicit adapter contract for non-reference implementations;
4. compare actual reports and exit behavior with normative expected outcomes without requiring byte-identical implementation internals;
5. preserve unknown, contested, prohibited and `requiresHumanReview` outcomes in conformance evidence;
6. emit deterministic JSON and text implementation reports with stable diagnostics;
7. include positive, negative, adversarial, resource-limit and repeatability fixtures;
8. document the boundary between reference self-conformance, independent implementation evidence and external AI-consumer proof.

## Scope boundary

Do not implement the JSON/CSV compiler, TypeScript or Python public SDK packages, review UI, hosted service, MCP adapter, registry, extensions, anticipation engine or external multi-model proof in this task.

Do not claim independent conformance until a genuinely separate implementation executes the frozen suite. The JSON/CSV compiler remains blocked until the adoption and review-tax gates are ready to run.

## Completion test

An independent implementer must be able to declare supported conformance classes, run the frozen suite locally through the adapter contract, inspect every pass, failure, unsupported capability and review-required result in a deterministic report, and reproduce the same assessment without hidden network access or provider-specific logic.
""", encoding="utf-8")

          ledger = Path("docs/roadmap/EXECUTION_LEDGER.md")
          ledger_text = ledger.read_text(encoding="utf-8")
          row = "| 2026-07-15 | #60 / #64 | Implement deterministic complete-contract formatting | ADR-0018; strict UTF-8 JSON parsing; duplicate-key rejection; exact-decimal and Unicode preservation; frozen Core ordering; unchanged arrays; atomic output; stable JSON/text reports; frozen valid, review-required and rejected fixtures; 13 focused tests; all repository suites and Vercel passed on the reviewed PR head | Complete contracts can be formatted repeatedly to identical bytes without inference, repair, array reordering or loss of human-review state | Define the provider-neutral full-Core conformance runner |\n"
          if row not in ledger_text:
              ledger.write_text(ledger_text.rstrip() + "\n" + row, encoding="utf-8")
          PY

      - name: Add cross-cutting formatter review
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/roadmap/reviews
          cat > docs/roadmap/reviews/ADR-0018_CROSS_CUTTING_REVIEW.md <<'EOF'
          # ADR-0018 cross-cutting impact review

          - Milestone: deterministic complete-contract formatter
          - Issue / PR: #60 / #64
          - Phase / track: Phase 2, Track A with Track B and C safeguards
          - Status: verified on the reviewed PR head
          - Responsible role: maintainer / implementer

          | Concern | Status | Deliverable and evidence | Reassessment trigger |
          |---|---|---|---|
          | AI-first and provider neutrality | verified | Stable JSON/text reports, deterministic UTF-8 output and no model/provider dependency | Report or formatting-profile version change |
          | Human review and contestability | verified | Exit code 2 and `formattedRequiresHumanReview` preserve accepted review outcomes before and after formatting | New validation outcome or repair behavior |
          | Privacy by design/default | verified | Local file processing; no upload, telemetry, retention or remote resolution | Hosted formatter or telemetry |
          | Security and untrusted input | verified | Duplicate-key, invalid UTF-8/JSON, non-finite number, size, depth, node and overwrite-race rejection | Parser, limit or file-write change |
          | Unknown-safe and failure-safe | verified | Invalid input is blocked without output or silent repair; policy, conflict and uncertainty data are preserved | New inference or repair feature |
          | Accessibility | notApplicableWithReason | CLI and machine-readable artifacts add no visual interaction; public website work remains isolated in PR #63 | Graphical formatter UI |
          | Internationalization | verified | UTF-8 output, direct Unicode preservation and exact-decimal rendering independent of locale | Locale-aware presentation layer |
          | Versioning and migration | verified | ADR-0018 and formatting spec version output and report semantics | Any ordering, number or report change |
          | Performance and reliability | verified | Bounded input bytes, depth, node count and output bytes; atomic writes and idempotence tests | Limit or algorithm change |
          | Independent conformance | deferredWithReason | Reference behavior and fixtures are frozen; independent proof requires the next conformance-runner milestone and a separate implementation | Conformance runner or external implementation |
          | Documentation and developer experience | verified | ADR, specification, error catalogue, fixtures, CLI commands and README section | CLI or installation change |
          | SEO/AEO/GEO | deferredWithReason | No website claim is changed in this engine PR; site alignment remains in draft PR #63 | Website PR or public release |
          | Prior art and public claims | verified | The formatter is described as an ADUC profile, not RFC 8785 and not proof of a world-first standard | Public novelty claim |
          | Legal, licensing and governance | verified | No permission, authority or legal decision is inferred; existing repository licenses and ADR process apply | Package release or governance change |
          | Tests and evidence | verified | 13 focused tests, frozen fixtures, full official suites, double-format byte comparison, Core revalidation and Vercel success | Engine, schema or formatter change |

          ## Deferred boundaries

          The formatter does not close the Phase 2 independent-conformance, SDK, package-publication or installation-usability gates. It does not authorize the compiler, review UI or external interoperability claims.
          EOF

      - name: Validate synchronized documentation
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m unittest discover -s tests/core_formatter -p "test_*.py"
          python -m unittest discover -s tests/roadmap -p "test_*.py"
          python -m unittest discover -s tests/website -p "test_*.py"
          python tools/validate_website.py
          python tools/aduc_core_format.py examples/core/complete-model.example.json --output /tmp/aduc-finalized.json --report-format json >/tmp/aduc-format-report.json || test "$?" = "2"
          python tools/aduc_core.py validate /tmp/aduc-finalized.json

      - name: Commit synchronized milestone documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md docs/roadmap
          git commit -m "Roadmap: close formatter milestone and authorize conformance runner"
          git push origin HEAD:core/deterministic-complete-contract-formatter
